version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: personal-cfo-postgres
    environment:
      POSTGRES_DB: personal_cfo_os
      POSTGRES_USER: personal_cfo
      POSTGRES_PASSWORD: personal_cfo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: personal-cfo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  temporal:
    image: temporalio/auto-setup:1.27.2
    container_name: personal-cfo-temporal
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: personal_cfo
      POSTGRES_PWD: personal_cfo
      POSTGRES_SEEDS: postgres
    depends_on:
      - postgres
    ports:
      - "7233:7233"

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: personal-cfo-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:latest
    container_name: personal-cfo-prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: personal-cfo-grafana
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:
